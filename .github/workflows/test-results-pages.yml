name: Publish Test Results

on:
  push:
    branches:
      - release
  workflow_dispatch:

concurrency:
  group: pages-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      PAGES_ENABLEMENT_TOKEN: ${{ secrets.PAGES_ENABLEMENT_TOKEN }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Run self-test report
        id: self_test
        shell: bash
        run: |
          log_path="${RUNNER_TEMP}/self-test-report.log"
          set +e
          yarn test:coverage 2>&1 | tee "$log_path"
          status=${PIPESTATUS[0]}
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"
          echo "log_path=$log_path" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Build Pages payload
        run: yarn pages:build

      - name: Configure GitHub Pages (auto-enable)
        if: ${{ env.PAGES_ENABLEMENT_TOKEN != '' }}
        uses: actions/configure-pages@v5
        with:
          enablement: true
          token: ${{ env.PAGES_ENABLEMENT_TOKEN }}

      - name: Configure GitHub Pages
        if: ${{ env.PAGES_ENABLEMENT_TOKEN == '' }}
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./.test-results/github-pages

      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Assert self-test pass
        if: always()
        shell: bash
        run: |
          if [ "${{ steps.self_test.outputs.exit_code }}" = "0" ]; then
            exit 0
          fi
          echo "Self-test report failed. Captured log:"
          if [ -f "${{ steps.self_test.outputs.log_path }}" ]; then
            cat "${{ steps.self_test.outputs.log_path }}"
          else
            echo "No self-test log file found at ${{ steps.self_test.outputs.log_path }}"
          fi
          exit 1
