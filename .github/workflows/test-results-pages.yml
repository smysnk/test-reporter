name: Publish Test Results

on:
  push:
    branches:
      - release
  workflow_dispatch:

concurrency:
  group: pages-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Run self-test report
        id: self_test
        shell: bash
        run: |
          set +e
          yarn test:coverage
          status=$?
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Build Pages payload
        run: yarn pages:build

      - name: Configure GitHub Pages (auto-enable)
        if: ${{ secrets.PAGES_ENABLEMENT_TOKEN != '' }}
        uses: actions/configure-pages@v5
        with:
          enablement: true
          token: ${{ secrets.PAGES_ENABLEMENT_TOKEN }}

      - name: Configure GitHub Pages
        if: ${{ secrets.PAGES_ENABLEMENT_TOKEN == '' }}
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./.test-results/github-pages

      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Assert self-test pass
        if: always()
        run: test "${{ steps.self_test.outputs.exit_code }}" = "0"
