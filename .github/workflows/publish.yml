name: Main Release Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      publish_npm:
        description: "Publish npm packages to npm"
        required: false
        default: true
        type: boolean
      deploy_fleet:
        description: "Deploy the Fleet bundle after the image build"
        required: false
        default: true
        type: boolean

concurrency:
  group: publish-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Capture build start time
        run: echo "TEST_STATION_BUILD_STARTED_AT=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_ENV"

      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Lint
        run: yarn lint

      - name: Test (node suite)
        run: yarn test:node

      - name: Run self-test report
        id: self_test
        shell: bash
        run: |
          log_path="${RUNNER_TEMP}/self-test-report.log"
          set +e
          yarn test:coverage 2>&1 | tee "$log_path"
          status=${PIPESTATUS[0]}
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"
          echo "log_path=$log_path" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload self-test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: self-test-report
          path: ./.test-results/self-test-report
          if-no-files-found: warn

      - name: Derive report publishing status
        if: always()
        shell: bash
        run: |
          if [ "${{ steps.self_test.outputs.exit_code }}" = "0" ]; then
            echo "TEST_STATION_CI_STATUS=passed" >> "$GITHUB_ENV"
          else
            echo "TEST_STATION_CI_STATUS=failed" >> "$GITHUB_ENV"
          fi

      - name: Configure AWS credentials for report archive sync
        if: ${{ always() && vars.S3_BUCKET != '' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.S3_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.S3_AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.S3_AWS_REGION != '' && vars.S3_AWS_REGION || 'us-east-1' }}

      - name: Sync self-test report to S3
        if: ${{ always() && vars.S3_BUCKET != '' }}
        shell: bash
        env:
          S3_BUCKET: ${{ vars.S3_BUCKET }}
          S3_STORAGE_PREFIX: ${{ vars.S3_STORAGE_PREFIX }}
        run: |
          storage_prefix="${S3_STORAGE_PREFIX:-ci/${GITHUB_REPOSITORY}/${GITHUB_RUN_ID}/${GITHUB_RUN_ATTEMPT}}"
          echo "S3_STORAGE_PREFIX=$storage_prefix" >> "$GITHUB_ENV"
          aws s3 sync ./.test-results/self-test-report "s3://${S3_BUCKET}/${storage_prefix}" --no-progress

      - name: Publish self-test report to ingest endpoint
        if: always()
        shell: bash
        env:
          TEST_STATION_INGEST_ENDPOINT: https://test-station.smysnk.com/api/ingest
          TEST_STATION_INGEST_PROJECT_KEY: test-station
          TEST_STATION_INGEST_SHARED_KEY: ${{ secrets.TEST_STATION_INGEST_SHARED_KEY }}
          S3_PUBLIC_URL: ${{ vars.S3_PUBLIC_URL }}
          S3_BUCKET: ${{ vars.S3_BUCKET }}
        run: |
          if [ -z "$TEST_STATION_INGEST_SHARED_KEY" ]; then
            echo "Skipping ingest publish because TEST_STATION_INGEST_SHARED_KEY is not set."
            exit 0
          fi
          export TEST_STATION_BUILD_COMPLETED_AT="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          export S3_STORAGE_PREFIX="${S3_STORAGE_PREFIX:-ci/${GITHUB_REPOSITORY}/${GITHUB_RUN_ID}/${GITHUB_RUN_ATTEMPT}}"
          node ./scripts/publish-ingest-report.mjs --input ./.test-results/self-test-report/report.json

      - name: Assert self-test pass
        if: always()
        shell: bash
        run: |
          if [ "${{ steps.self_test.outputs.exit_code }}" = "0" ]; then
            exit 0
          fi
          echo "Self-test report failed. Captured log:"
          if [ -f "${{ steps.self_test.outputs.log_path }}" ]; then
            cat "${{ steps.self_test.outputs.log_path }}"
          else
            echo "No self-test log file found at ${{ steps.self_test.outputs.log_path }}"
          fi
          exit 1

      - name: Build
        run: yarn build

      - name: Run smoke example
        run: |
          rm -rf ./examples/generic-node-library/artifacts/test-report
          node ./bin/test-station.mjs run --config ./examples/generic-node-library/test-station.config.mjs --coverage
          test -f ./examples/generic-node-library/artifacts/test-report/report.json
          test -f ./examples/generic-node-library/artifacts/test-report/modules.json
          test -f ./examples/generic-node-library/artifacts/test-report/ownership.json
          test -f ./examples/generic-node-library/artifacts/test-report/index.html
          test -d ./examples/generic-node-library/artifacts/test-report/raw

      - name: Upload smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: generic-node-library-report
          path: ./examples/generic-node-library/artifacts/test-report
          if-no-files-found: warn

  npm-publish:
    needs: validate
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: yarn

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Set npm package version from build number
        env:
          BUILD_NUMBER: ${{ github.run_number }}
          VERSION_MAJOR: ${{ vars.NPM_VERSION_MAJOR }}
          VERSION_MINOR: ${{ vars.NPM_VERSION_MINOR }}
          PATCH_MODE: ${{ vars.NPM_VERSION_PATCH_MODE }}
          PATCH_FIXED: ${{ vars.NPM_VERSION_PATCH_FIXED }}
        run: ./scripts/release/set-version-from-build.sh

      - name: Validate and optionally publish npm packages
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_PUBLISH: ${{ ((github.event_name == 'push' && github.ref_name == 'main') || inputs.publish_npm) && '1' || '0' }}
        run: ./scripts/release/release-npm-packages.sh

  docker-image:
    needs: npm-publish
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/image-build.yml
    with:
      image_tag: main
      push_image: true
    secrets: inherit

  fleet-deploy:
    needs: docker-image
    if: ${{ github.event_name == 'push' || inputs.deploy_fleet }}
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Write Fleet kubeconfig
        shell: bash
        env:
          FLEET_KUBECONFIG: ${{ secrets.FLEET_KUBECONFIG }}
        run: |
          test -n "$FLEET_KUBECONFIG" || { echo "Missing FLEET_KUBECONFIG secret"; exit 1; }
          kubeconfig_path="${RUNNER_TEMP}/fleet-kubeconfig"
          printf '%s' "$FLEET_KUBECONFIG" > "$kubeconfig_path"
          chmod 600 "$kubeconfig_path"
          echo "KUBECONFIG_PATH=$kubeconfig_path" >> "$GITHUB_ENV"

      - name: Deploy Fleet bundle and roll main workloads
        run: ./scripts/deploy-fleet.sh --kubeconfig "$KUBECONFIG_PATH" --restart
