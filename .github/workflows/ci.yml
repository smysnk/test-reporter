name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Capture build start time
        run: echo "TEST_STATION_BUILD_STARTED_AT=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_ENV"

      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Lint
        run: yarn lint

      - name: Run node test suite
        run: yarn test:node

      - name: Run self-test report
        id: self_test
        shell: bash
        run: |
          set +e
          yarn test:coverage
          status=$?
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload self-test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: self-test-report
          path: ./.test-results/self-test-report
          if-no-files-found: warn

      - name: Assert self-test pass
        if: always()
        run: test "${{ steps.self_test.outputs.exit_code }}" = "0"
