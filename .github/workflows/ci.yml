name: CI

on:
  pull_request:
  push:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Capture build start time
        run: echo "TEST_STATION_BUILD_STARTED_AT=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_ENV"

      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Lint
        run: yarn lint

      - name: Run node test suite
        run: yarn test:node

      - name: Run self-test report
        id: self_test
        shell: bash
        run: |
          set +e
          yarn test:coverage
          status=$?
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload self-test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: self-test-report
          path: ./.test-results/self-test-report
          if-no-files-found: warn

      - name: Derive report publishing status
        if: always()
        shell: bash
        run: |
          if [ "${{ steps.self_test.outputs.exit_code }}" = "0" ]; then
            echo "TEST_STATION_CI_STATUS=passed" >> "$GITHUB_ENV"
          else
            echo "TEST_STATION_CI_STATUS=failed" >> "$GITHUB_ENV"
          fi

      - name: Configure AWS credentials for report archive sync
        if: ${{ always() && github.event_name == 'push' && vars.TEST_STATION_ARTIFACT_S3_BUCKET != '' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.TEST_STATION_ARTIFACT_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.TEST_STATION_ARTIFACT_AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.TEST_STATION_ARTIFACT_AWS_REGION != '' && vars.TEST_STATION_ARTIFACT_AWS_REGION || 'us-east-1' }}

      - name: Sync self-test report to S3
        if: ${{ always() && github.event_name == 'push' && vars.TEST_STATION_ARTIFACT_S3_BUCKET != '' }}
        shell: bash
        env:
          TEST_STATION_ARTIFACT_S3_BUCKET: ${{ vars.TEST_STATION_ARTIFACT_S3_BUCKET }}
          TEST_STATION_ARTIFACT_STORAGE_PREFIX: ${{ vars.TEST_STATION_ARTIFACT_STORAGE_PREFIX }}
        run: |
          storage_prefix="${TEST_STATION_ARTIFACT_STORAGE_PREFIX:-ci/${GITHUB_REPOSITORY}/${GITHUB_RUN_ID}/${GITHUB_RUN_ATTEMPT}}"
          echo "TEST_STATION_ARTIFACT_STORAGE_PREFIX=$storage_prefix" >> "$GITHUB_ENV"
          aws s3 sync ./.test-results/self-test-report "s3://${TEST_STATION_ARTIFACT_S3_BUCKET}/${storage_prefix}" --no-progress

      - name: Publish self-test report to ingest endpoint
        if: ${{ always() && github.event_name == 'push' }}
        shell: bash
        env:
          TEST_STATION_INGEST_ENDPOINT: https://test-station.smysnk.com/api/ingest
          TEST_STATION_INGEST_PROJECT_KEY: test-station
          TEST_STATION_INGEST_SHARED_KEY: ${{ secrets.TEST_STATION_INGEST_SHARED_KEY }}
          TEST_STATION_ARTIFACT_BASE_URL: ${{ vars.TEST_STATION_ARTIFACT_BASE_URL }}
          TEST_STATION_ARTIFACT_S3_BUCKET: ${{ vars.TEST_STATION_ARTIFACT_S3_BUCKET }}
        run: |
          test -n "$TEST_STATION_INGEST_SHARED_KEY" || { echo "Missing TEST_STATION_INGEST_SHARED_KEY secret"; exit 1; }
          export TEST_STATION_BUILD_COMPLETED_AT="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          export TEST_STATION_ARTIFACT_STORAGE_PREFIX="${TEST_STATION_ARTIFACT_STORAGE_PREFIX:-ci/${GITHUB_REPOSITORY}/${GITHUB_RUN_ID}/${GITHUB_RUN_ATTEMPT}}"
          node ./scripts/publish-ingest-report.mjs --input ./.test-results/self-test-report/report.json

      - name: Assert self-test pass
        if: always()
        run: test "${{ steps.self_test.outputs.exit_code }}" = "0"

      - name: Build
        run: yarn build

      - name: Run smoke example
        run: |
          rm -rf ./examples/generic-node-library/artifacts/test-report
          node ./bin/test-station.mjs run --config ./examples/generic-node-library/test-station.config.mjs --coverage
          test -f ./examples/generic-node-library/artifacts/test-report/report.json
          test -f ./examples/generic-node-library/artifacts/test-report/modules.json
          test -f ./examples/generic-node-library/artifacts/test-report/ownership.json
          test -f ./examples/generic-node-library/artifacts/test-report/index.html
          test -d ./examples/generic-node-library/artifacts/test-report/raw

      - name: Validate unified image build
        run: docker build --file docker/Dockerfile --tag test-station-ci .

      - name: Upload smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: generic-node-library-report
          path: ./examples/generic-node-library/artifacts/test-report
          if-no-files-found: warn
