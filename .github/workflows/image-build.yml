name: Build Unified Image

on:
  workflow_call:
    inputs:
      image_tag:
        description: "Branch or release tag to publish alongside the sha tag"
        required: false
        default: main
        type: string
      push_image:
        description: "Push the built image to the target registry"
        required: false
        default: true
        type: boolean
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Branch or release tag to publish alongside the sha tag"
        required: false
        default: main
        type: string
      push_image:
        description: "Push the built image to the target registry"
        required: false
        default: true
        type: boolean

env:
  # To publish to public Docker Hub instead of GHCR, set:
  # - vars.CONTAINER_REGISTRY=docker.io
  # - vars.CONTAINER_IMAGE_REPOSITORY=<dockerhub-namespace>/test-station
  # - vars.CONTAINER_REGISTRY_USERNAME=<dockerhub-username>
  # - secrets.CONTAINER_REGISTRY_PASSWORD=<dockerhub-access-token>
  CONTAINER_REGISTRY: ${{ vars.CONTAINER_REGISTRY != '' && vars.CONTAINER_REGISTRY || 'ghcr.io' }}
  CONTAINER_IMAGE_REPOSITORY: ${{ vars.CONTAINER_IMAGE_REPOSITORY != '' && vars.CONTAINER_IMAGE_REPOSITORY || format('{0}/test-station', github.repository_owner) }}
  CONTAINER_REGISTRY_USERNAME: ${{ vars.CONTAINER_REGISTRY_USERNAME != '' && vars.CONTAINER_REGISTRY_USERNAME || github.actor }}

concurrency:
  group: image-build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log resolved image target
        run: echo "Publishing image to ${CONTAINER_REGISTRY}/${CONTAINER_IMAGE_REPOSITORY}"

      - name: Log in to GitHub Container Registry
        if: ${{ env.CONTAINER_REGISTRY == 'ghcr.io' }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to external container registry
        if: ${{ env.CONTAINER_REGISTRY != 'ghcr.io' }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.CONTAINER_REGISTRY }}
          username: ${{ env.CONTAINER_REGISTRY_USERNAME }}
          password: ${{ secrets.CONTAINER_REGISTRY_PASSWORD }}

      - name: Derive image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.CONTAINER_REGISTRY }}/${{ env.CONTAINER_IMAGE_REPOSITORY }}
          tags: |
            type=raw,value=${{ inputs.image_tag }}
            type=sha,format=long

      - name: Build and publish unified web/server image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64
          push: ${{ inputs.push_image }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
