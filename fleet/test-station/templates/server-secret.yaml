{{- if not .Values.server.existingSecret }}
{{- $secret := dict -}}
{{- range $key, $value := default (dict) .Values.server.secretEnv }}
{{- $_ := set $secret $key $value -}}
{{- end }}
{{- range $key, $value := default (dict) .Values.server.secret }}
{{- $_ := set $secret $key $value -}}
{{- end }}
{{- if or (not (hasKey $secret "DATABASE_URL")) (eq (printf "%v" (index $secret "DATABASE_URL")) "") }}
{{- $_ := set $secret "DATABASE_URL" "postgres://test-station:change-me@postgresql.default.svc.cluster.local:5432/test_station" -}}
{{- end }}
{{- if or (not (hasKey $secret "INGEST_SHARED_KEY")) (eq (printf "%v" (index $secret "INGEST_SHARED_KEY")) "") }}
{{- $_ := set $secret "INGEST_SHARED_KEY" "change-me" -}}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "test-station.serverSecretName" . }}
  labels:
    {{- include "test-station.labels" . | nindent 4 }}
    app.kubernetes.io/component: server
type: Opaque
stringData:
  {{- range $key := keys $secret | sortAlpha }}
  {{ $key }}: {{ printf "%v" (index $secret $key) | quote }}
  {{- end }}
{{- end }}
