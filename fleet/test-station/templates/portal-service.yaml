apiVersion: v1
kind: Service
metadata:
  name: {{ include "test-station.portalName" . }}
  labels:
    {{- include "test-station.labels" . | nindent 4 }}
    app.kubernetes.io/component: portal
spec:
  type: {{ .Values.portal.service.type }}
  selector:
    {{- include "test-station.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: portal
  ports:
    - name: http
      port: {{ .Values.portal.service.port }}
      targetPort: http
      protocol: TCP
