{{- if .Values.web.ingress.enabled }}
{{- $hosts := default (list) .Values.web.ingress.hosts -}}
{{- $host := .Values.web.ingress.host | default (include "test-station.publicDomain" . | trim) -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "test-station.webName" . }}
  labels:
    {{- include "test-station.labels" . | nindent 4 }}
    app.kubernetes.io/component: web
  {{- with .Values.web.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.web.ingress.className }}
  ingressClassName: {{ .Values.web.ingress.className }}
  {{- end }}
  rules:
    {{- if gt (len $hosts) 0 }}
    {{- range $hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          {{- range .paths }}
          - path: {{ .path }}
            pathType: {{ .pathType }}
            backend:
              service:
                name: {{ include "test-station.webName" $ }}
                port:
                  number: {{ $.Values.web.service.port }}
          {{- end }}
    {{- end }}
    {{- else if $host }}
    - host: {{ $host | quote }}
      http:
        paths:
          - path: {{ $.Values.web.ingress.path }}
            pathType: {{ $.Values.web.ingress.pathType }}
            backend:
              service:
                name: {{ include "test-station.webName" $ }}
                port:
                  number: {{ $.Values.web.service.port }}
    {{- end }}
  {{- with .Values.web.ingress.tls }}
  tls:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
