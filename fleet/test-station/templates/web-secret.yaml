{{- if not .Values.web.existingSecret }}
{{- $secret := dict -}}
{{- range $key, $value := default (dict) .Values.web.secretEnv }}
{{- $_ := set $secret $key $value -}}
{{- end }}
{{- range $key, $value := default (dict) .Values.web.secret }}
{{- $_ := set $secret $key $value -}}
{{- end }}
{{- if or (not (hasKey $secret "NEXTAUTH_SECRET")) (eq (printf "%v" (index $secret "NEXTAUTH_SECRET")) "") }}
{{- $_ := set $secret "NEXTAUTH_SECRET" "change-me" -}}
{{- end }}
{{- if not (hasKey $secret "GITHUB_CLIENT_ID") }}
{{- $_ := set $secret "GITHUB_CLIENT_ID" "" -}}
{{- end }}
{{- if not (hasKey $secret "GITHUB_CLIENT_SECRET") }}
{{- $_ := set $secret "GITHUB_CLIENT_SECRET" "" -}}
{{- end }}
{{- if not (hasKey $secret "GOOGLE_CLIENT_ID") }}
{{- $_ := set $secret "GOOGLE_CLIENT_ID" "" -}}
{{- end }}
{{- if not (hasKey $secret "GOOGLE_CLIENT_SECRET") }}
{{- $_ := set $secret "GOOGLE_CLIENT_SECRET" "" -}}
{{- end }}
{{- if not (hasKey $secret "DISCORD_CLIENT_ID") }}
{{- $_ := set $secret "DISCORD_CLIENT_ID" "" -}}
{{- end }}
{{- if not (hasKey $secret "DISCORD_CLIENT_SECRET") }}
{{- $_ := set $secret "DISCORD_CLIENT_SECRET" "" -}}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "test-station.webSecretName" . }}
  labels:
    {{- include "test-station.labels" . | nindent 4 }}
    app.kubernetes.io/component: web
type: Opaque
stringData:
  {{- range $key := keys $secret | sortAlpha }}
  {{ $key }}: {{ printf "%v" (index $secret $key) | quote }}
  {{- end }}
{{- end }}
