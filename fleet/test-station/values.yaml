global:
  publicScheme: https
  publicDomain: ""

image:
  repository: ghcr.io/smysnk/test-station
  tag: main
  pullPolicy: IfNotPresent
  pullSecrets: []

server:
  replicaCount: 1
  args:
    - server
  existingConfigMap: ""
  existingSecret: ""
  service:
    type: NodePort
    port: 4400
    nodePort: null
  config:
    NODE_ENV: production
    SERVER_PORT: "4400"
    WEB_URL: ""
  secret:
    DATABASE_URL: postgres://test-station:change-me@postgresql.default.svc.cluster.local:5432/test_station
    INGEST_API_KEYS: change-me
    INGEST_SHARED_KEY: ""
  podAnnotations: {}
  resources: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}
  livenessProbe:
    path: /healthz
    initialDelaySeconds: 20
    periodSeconds: 20
  readinessProbe:
    path: /healthz
    initialDelaySeconds: 10
    periodSeconds: 10

web:
  replicaCount: 1
  args:
    - web
  existingConfigMap: ""
  existingSecret: ""
  service:
    type: NodePort
    port: 3001
    nodePort: null
  config:
    NODE_ENV: production
    WEB_PORT: "3001"
    WEB_GRAPHQL_PATH: /graphql
    SERVER_URL: ""
    NEXTAUTH_URL: ""
    WEB_DEFAULT_PROJECT_KEYS: "*"
    WEB_ADMIN_EMAILS: ""
  secret:
    NEXTAUTH_SECRET: change-me
    GITHUB_CLIENT_ID: ""
    GITHUB_CLIENT_SECRET: ""
    GOOGLE_CLIENT_ID: ""
    GOOGLE_CLIENT_SECRET: ""
    DISCORD_CLIENT_ID: ""
    DISCORD_CLIENT_SECRET: ""
  podAnnotations: {}
  resources: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}
  livenessProbe:
    path: /
    initialDelaySeconds: 30
    periodSeconds: 20
  readinessProbe:
    path: /
    initialDelaySeconds: 10
    periodSeconds: 10
  ingress:
    enabled: false
    className: ""
    annotations: {}
    host: ""
    path: /
    pathType: Prefix
    hosts: []
    tls: []
