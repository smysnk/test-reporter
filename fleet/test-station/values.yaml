image:
  repository: ghcr.io/smysnk/test-station-unified
  tag: main
  pullPolicy: IfNotPresent
  pullSecrets: []

server:
  replicaCount: 1
  args:
    - server
  service:
    type: ClusterIP
    port: 4400
  env:
    SERVER_PORT: "4400"
    PORTAL_URL: ""
  secretEnv:
    DATABASE_URL: postgres://test-station:change-me@postgresql.default.svc.cluster.local:5432/test_station
    INGEST_API_KEYS: change-me
    INGEST_SHARED_KEY: ""
  podAnnotations: {}
  resources: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}
  livenessProbe:
    path: /healthz
    initialDelaySeconds: 20
    periodSeconds: 20
  readinessProbe:
    path: /healthz
    initialDelaySeconds: 10
    periodSeconds: 10

portal:
  replicaCount: 1
  args:
    - portal
  service:
    type: ClusterIP
    port: 3001
  env:
    PORTAL_PORT: "3001"
    PORTAL_GRAPHQL_PATH: /graphql
    SERVER_URL: ""
    NEXTAUTH_URL: https://test-station.example.com
    PORTAL_DEFAULT_PROJECT_KEYS: "*"
    PORTAL_ADMIN_EMAILS: ""
  secretEnv:
    NEXTAUTH_SECRET: change-me
    GITHUB_CLIENT_ID: ""
    GITHUB_CLIENT_SECRET: ""
    DISCORD_CLIENT_ID: ""
    DISCORD_CLIENT_SECRET: ""
  podAnnotations: {}
  resources: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}
  livenessProbe:
    path: /
    initialDelaySeconds: 30
    periodSeconds: 20
  readinessProbe:
    path: /
    initialDelaySeconds: 10
    periodSeconds: 10
  ingress:
    enabled: false
    className: ""
    annotations: {}
    hosts:
      - host: test-station.example.com
        paths:
          - path: /
            pathType: Prefix
    tls: []
