services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-test_station}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  server:
    image: ${IMAGE:-test-station:local}
    build:
      context: ..
      dockerfile: docker/Dockerfile
    command: ["server"]
    restart: unless-stopped
    environment:
      NODE_ENV: production
      SERVER_PORT: ${SERVER_PORT:-4400}
      WEB_URL: ${WEB_URL:-http://localhost:3001}
      DATABASE_URL: ${DATABASE_URL:-postgres://postgres:postgres@postgres:5432/test_station}
      INGEST_API_KEYS: ${INGEST_API_KEYS:-local-dev-shared-key}
      INGEST_SHARED_KEY: ${INGEST_SHARED_KEY:-}
    ports:
      - "${SERVER_PORT:-4400}:${SERVER_PORT:-4400}"
    depends_on:
      - postgres

  web:
    image: ${IMAGE:-test-station:local}
    build:
      context: ..
      dockerfile: docker/Dockerfile
    command: ["web"]
    restart: unless-stopped
    environment:
      NODE_ENV: production
      WEB_PORT: ${WEB_PORT:-3001}
      SERVER_PORT: ${SERVER_PORT:-4400}
      SERVER_URL: ${SERVER_URL:-http://server:4400}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-test-station-web-development-secret}
      WEB_DEFAULT_PROJECT_KEYS: ${WEB_DEFAULT_PROJECT_KEYS:-*}
      WEB_ADMIN_EMAILS: ${WEB_ADMIN_EMAILS:-}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      DISCORD_CLIENT_ID: ${DISCORD_CLIENT_ID:-}
      DISCORD_CLIENT_SECRET: ${DISCORD_CLIENT_SECRET:-}
    ports:
      - "${WEB_PORT:-3001}:${WEB_PORT:-3001}"
    depends_on:
      - server

volumes:
  postgres-data:
