defaultNamespace: test-station

helm:
  releaseName: test-station
  chart: ./fleet/test-station
  values:
    image:
      tag: main
    global:
      publicDomain: test-station.smysnk.com
    server:
      existingSecret: test-station-runtime-secret
    web:
      existingSecret: test-station-runtime-secret
      ingress:
        enabled: true
        className: traefik
        annotations:
          cert-manager.io/cluster-issuer: letsencrypt-prod
        tls:
          enabled: true
          secretName: tls-test-station-smysnk-com
